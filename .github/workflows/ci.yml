name: Continuous integration

on:
  push:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      deploy_trigger:
        description: Force a deployment to PyPI
        default: "false"
        required: true
env:
  main-python-version: "3.14"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-dependency-glob: "**/pyproject.toml"
          cache-suffix: ${{ github.job }}
          enable-cache: true
      - name: Run nox
        run: uv tool run nox --session lint
  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 4
      matrix:
        os:
          - ubuntu-latest
          # - macos-latest
        python-version:
          # - "3.11"
          # - "3.12"
          # - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-dependency-glob: "**/pyproject.toml"
          cache-suffix: main-py${{ matrix.python-version }}
          enable-cache: true
      - name: HF cache
        id: hf_cache
        run: |
          uv tool run --with huggingface_hub --python ${{ matrix.python-version }} 'python' -c 'from huggingface_hub.constants import HF_HOME; print(f"dir={HF_HOME}")' >> $GITHUB_OUTPUT
          echo "version=$(uv pip show huggingface_hub | grep Version)" >> $GITHUB_OUTPUT
          echo "${{ runner.os }}-transformers-${{ steps.transfo-install.outputs.version }}"
      - uses: actions/cache@v5
        with:
          path: ${{ steps.hf_cache.outputs.dir }}
          key: ${{ runner.os }}-transformers-${{ steps.hf_cache.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-transformers-
      - name: Run nox
        run: uv tool run nox --session tests --python ${{ matrix.python-version }} -- --verbose
  build:
    name: Build wheels and sdist
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - "3.14"
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-suffix: build-py${{ matrix.python-version }}-${{ matrix.os }}
          enable-cache: true
      - name: Build wheels
        run: uv build --python ${{ matrix.python-version }} --wheel --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: dist-wheel
          path: ./dist/*.whl
  upload_pypi:
    needs: build
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'release' && github.event.action == 'published')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_trigger == 'true')
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.pypi_token }}
          # To test: repository_url: https://test.pypi.org/legacy/
